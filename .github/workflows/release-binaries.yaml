name: Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bun_target: bun-darwin-arm64
            oxc_binding: darwin-arm64
            archive: alint-aarch64-apple-darwin.tar.gz
            executable: alint
          - os: macos-latest
            target: x86_64-apple-darwin
            bun_target: bun-darwin-x64
            oxc_binding: darwin-x64
            archive: alint-x86_64-apple-darwin.tar.gz
            executable: alint
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bun_target: bun-linux-x64
            oxc_binding: linux-x64-gnu
            archive: alint-x86_64-unknown-linux-gnu.tar.gz
            executable: alint
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            bun_target: bun-linux-arm64
            oxc_binding: linux-arm64-gnu
            archive: alint-aarch64-unknown-linux-gnu.tar.gz
            executable: alint
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bun_target: bun-linux-x64-musl
            oxc_binding: linux-x64-musl
            archive: alint-x86_64-unknown-linux-musl.tar.gz
            executable: alint
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            bun_target: bun-linux-arm64-musl
            oxc_binding: linux-arm64-musl
            archive: alint-aarch64-unknown-linux-musl.tar.gz
            executable: alint
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bun_target: bun-windows-x64
            oxc_binding: win32-x64-msvc
            archive: alint-x86_64-pc-windows-msvc.zip
            executable: alint.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm run build

      - name: Install target oxc-parser binding
        shell: bash
        run: |
          set -euo pipefail
          OXC_VERSION="$(node -e "const { createRequire } = require('node:module'); const requireFromCore = createRequire(process.cwd() + '/packages/core/package.json'); console.log(requireFromCore('oxc-parser/package.json').version)")"
          pnpm add --workspace-root --save-dev --force "@oxc-parser/binding-${{ matrix.oxc_binding }}@$OXC_VERSION"

      - name: Build executable
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec tsx packages/cli/scripts/build-bun-executable.ts \
            --target ${{ matrix.target }} \
            --bun-target ${{ matrix.bun_target }} \
            --oxc-binding ${{ matrix.oxc_binding }} \
            --outfile target/${{ matrix.target }}/${{ matrix.executable }}

      - name: Sign macOS executable
        if: runner.os == 'macOS'
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID_APPLICATION" ]; then
            echo "::warning title=macOS signing skipped::APPLE_DEVELOPER_ID_APPLICATION is not configured."
            exit 0
          fi

          codesign --force --timestamp --options runtime \
            --sign "$APPLE_DEVELOPER_ID_APPLICATION" \
            target/${{ matrix.target }}/${{ matrix.executable }}

      - name: Smoke test executable
        shell: bash
        run: |
          set -euo pipefail
          target/${{ matrix.target }}/${{ matrix.executable }} --help

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tar -czf ${{ matrix.archive }} -C target/${{ matrix.target }} ${{ matrix.executable }}
          shasum -a 256 ${{ matrix.archive }} | awk '{ print $1 }' > ${{ matrix.archive }}.sha256

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/${{ matrix.executable }}" -DestinationPath "${{ matrix.archive }}"
          $hash = (Get-FileHash -Algorithm SHA256 "${{ matrix.archive }}").Hash.ToLower()
          Set-Content -Path "${{ matrix.archive }}.sha256" -Value $hash

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  notarize-macos:
    name: Notarize macOS ${{ matrix.archive }}
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - archive: alint-aarch64-apple-darwin.tar.gz
          - archive: alint-x86_64-apple-darwin.tar.gz

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.archive }}

      - name: Set up notarization credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials alint-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Submit executable for notarization
        run: |
          set -euo pipefail
          tar -xzf ${{ matrix.archive }}
          zip alint-notary.zip alint
          xcrun notarytool submit alint-notary.zip --keychain-profile alint-notary --wait
          tar -czf ${{ matrix.archive }} alint
          shasum -a 256 ${{ matrix.archive }} | awk '{ print $1 }' > ${{ matrix.archive }}.sha256

      - name: Upload notarized macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: notarized-${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  publish:
    name: Publish release artifacts
    needs: [build, notarize-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prefer notarized macOS archives
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name 'alint-*' -o -name '*.sha256' \) -print0 | while IFS= read -r -d '' file; do
            case "$file" in
              artifacts/notarized-*/*)
                cp "$file" release/
                ;;
              *apple-darwin*)
                if [ ! -e "release/$(basename "$file")" ]; then
                  cp "$file" release/
                fi
                ;;
              *)
                cp "$file" release/
                ;;
            esac
          done

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" release/* --clobber
